name: Quality Gates

on:
  pull_request:
  push:
    branches: ['main']

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: DE Index Drift Check
        run: npm run index:de:check
